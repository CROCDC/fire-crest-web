# Production: used by Jenkins. Domain firecrest.nexttech.com.ar via nginx-proxy.
# Local dev: use `python run.py` or `flask run`. For local Docker: create network first: docker network create proxy

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fire-crest-web-app
    environment:
      - FLASK_APP=run.py
      - VIRTUAL_HOST=firecrest.nexttech.com.ar,www.firecrest.nexttech.com.ar
      - VIRTUAL_PORT=7006
      - LETSENCRYPT_HOST=firecrest.nexttech.com.ar,www.firecrest.nexttech.com.ar
      - LETSENCRYPT_EMAIL=admin@pantech.solutions
    ports:
      - "7006:7006"
    expose:
      - "7006"
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "com.github.nginx-proxy.nginx_proxy=true"
      - com.github.nginxproxy.nginx-proxy.startup_wait=30

networks:
  proxy:
    external: true
